[Common]
; Credenciales de la cuenta a testear. Se consumen solo en el tester.
Login=numero-de-cuenta
Password=contraseña
Server=servidor-del-broker
KeepPrivate=1           ; 1 evita que se guarden credenciales en logs/envíos a crash reports.

[StartUp]
; Qué abrir al iniciar la terminal (no afecta el tester). Déjalo vacío para modo “headless”.
Expert=
ExpertParameters=
Symbol=
Period=

[Tester]
; EA relativo a MQL5\Experts de la instancia (%APPDATA%\MetaQuotes\Terminal\<id>\MQL5\Experts\...).
Expert=EaStudio\ejemplo.ex5;el directorio EaStudio, ya lo crea el setup de inicio, y nosotros le decimos al compilador donde alojarlo.

; Preset .set en MQL5\Profiles\Tester (misma instancia). Deja vacío para defaults del EA.
ExpertParameters=

; Activo y marco temporal del backtest.
Symbol=EURUSD
Period=M15

; Modelo 0 = ticks (más preciso). Spread 0 usa el histórico.
Model=0
Spread=0

; Rango de fechas del test.
FromDate=2025.01.01
ToDate=2025.12.31

; 0 = backtest único. 1 = lenta, 2 = genética, 3 = multi-símbolo.
Optimization=0

; 0 sin forward. 1/2/3 fracciones finales; 4 usa ForwardDate.
ForwardMode=0

; 0 sin gráfico; 1 abre modo visual (más lento).
Visual=0

; Reporte relativo al data folder de la instancia (no a la carpeta del exe).
Report=\reports\nombredelreporte_single.htm ;por convencion, termina con _single.htm para distinguirlo de optimizaciones.
ReplaceReport=1          ; 1 sobrescribe, 0 agrega sufijo.

ShutdownTerminal=1       ; Cierra MT5 al terminar.
Port=3000                ; Cambia si corres instancias en paralelo.
