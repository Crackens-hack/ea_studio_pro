[Common]
; Credenciales de la cuenta (solo para el tester).
Login=numero-de-cuenta
Password=contraseña
Server=servidor-del-broker
KeepPrivate=1

[StartUp]
; Sin carga de gráficos/EAs al abrir la terminal.
Expert=
ExpertParameters=
Symbol=
Period=

[Tester]
; EA relativo a MQL5\Experts de la instancia.
Expert=EaStudio\ea_metricas_demo.ex5

; Preset con rangos para optimizar (en MQL5\Profiles\Tester\ea_metricas_demo.set).
ExpertParameters=ea_metricas_demo.set

Symbol=EURUSD
Period=M15
Model=0
Spread=0
FromDate=2025.01.01
ToDate=2025.12.31

; Optimización genética.
Optimization=2

; Sin forward en este preset.
ForwardMode=0

Visual=0

; Reporte relativo al data folder de la instancia.
Report=\reports\MyExpert_genetico.htm
ReplaceReport=1
ShutdownTerminal=1
Port=3000
