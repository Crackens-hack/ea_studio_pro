; ============================================================================
; PLANTILLA_DOCUMENTO.INI
; Ejemplo exhaustivo y comentado de configuración para Strategy Tester MT5.
; Úsalo como referencia: copia los valores que necesites a otras plantillas.
; No está pensada para ejecutarse tal cual.
; ============================================================================

[Common]
; Credenciales de la cuenta a testear (solo las consume el tester).
Login=12345678
Password=tu_password
Server=Broker-Server
KeepPrivate=1          ; 1 evita que se guarden credenciales en logs/crash reports.

; Campos opcionales (normalmente en blanco)
Currency=USD           ; Moneda de la cuenta si se requiere especificar.
Company=               ; Nombre de la compañía (opcional).
LicenseFile=           ; Ruta a licencia si aplica.

[StartUp]
; Qué abrir al iniciar la terminal (no afecta al tester; se usa para modo visual/manual).
Expert=                ; Ej: Experts\Scripts\whatever.ex5
ExpertParameters=      ; Preset para el Expert anterior (no el del tester).
Symbol=                ; Símbolo a abrir en la interfaz (no en tester).
Period=                ; Marco temporal de la ventana, ej: H1.

[Tester]
; --------------------------------------------------------------------------
; Rutas de EA y preset (.set)
; --------------------------------------------------------------------------
; Ruta relativa a MQL5\Experts de la instancia activa.
; Usa prefijo obligatorio de la carpeta donde dejas los EAs (ej: Ea_Studio\).
Expert=Ea_Studio\MiEA.ex5

; Archivo .set relativo a MQL5\Profiles\Tester (misma instancia).
; Vacío para usar valores por defecto o para single sin preset.
ExpertParameters=MiEA.set

; --------------------------------------------------------------------------
; Activo y marco temporal
; --------------------------------------------------------------------------
Symbol=EURUSD          ; Debe existir en Market Watch (incluye sufijo si lo hay).
; Period admite: M1,M2,M3,M4,M5,M6,M10,M12,M15,M20,M30,H1,H2,H3,H4,H6,H8,H12,D1,W1,MN1
Period=H1

; --------------------------------------------------------------------------
; Modelo de ticks y spread
; --------------------------------------------------------------------------
; Model: 0=Every tick (clásico), 1=OHLC M1, 2=Open prices, 3=Math calc,
;        4=Real ticks, 5=Every tick based on real ticks.
Model=0

; Spread: 0 usa el spread actual del símbolo; cualquier otro valor fija pips.
Spread=0

; --------------------------------------------------------------------------
; Rango de fechas
; --------------------------------------------------------------------------
UseDate=1              ; 0 usa todo el histórico, 1 aplica rango.
FromDate=2024.01.01
ToDate=2026.01.01

; --------------------------------------------------------------------------
; Optimizaciones y criterios
; --------------------------------------------------------------------------
; Optimization:
;   0 = Slow complete (búsqueda exhaustiva)
;   1 = Fast genetic
;   2 = All symbols in Market Watch (multi-símbolo)
;   3 = Forward optimization
;   4 = Cluster (requiere red local de agentes)
;   5 = Slow complete con control estricto (builds antiguos)
;   DATO OPTIMIZACIÓN, si despues del signo igual se deja vacío es single run.
Optimization=1

; OptimizationCriterion:
;   0=Balance max, 1=PF, 2=Expected Payoff, 3=Drawdown min,
;   4=Recovery Factor max, 5=Sharpe Ratio max, 6=Custom (OnTester)
OptimizationCriterion=6

; --------------------------------------------------------------------------
; Forward test (solo si Optimization=3)
; --------------------------------------------------------------------------
ForwardMode=0          ; 0 off, 1 por tiempo, 2 % de barras, 3 % de trades, 4 fecha fija
ForwardDate=0          ; Usado si ForwardMode=4 (formato YYYY.MM.DD)

; --------------------------------------------------------------------------
; Visual mode
; --------------------------------------------------------------------------
Visual=0               ; 0 off, 1 on (solo backtest single; no optimizaciones)

; --------------------------------------------------------------------------
; Capital y apalancamiento
; --------------------------------------------------------------------------
Deposit=10000
Currency=USD
Leverage=100

; --------------------------------------------------------------------------
; Reportes
; --------------------------------------------------------------------------
; Ruta relativa al data folder de la instancia.
; Buenas prácticas: prefijo report\ y sufijos que indiquen modo.
Report=report\report_single_MiEA.htm
ReplaceReport=1        ; 1 sobrescribe, 0 agrega sufijo numérico.

; --------------------------------------------------------------------------
; Control de apagado y puerto de agentes
; --------------------------------------------------------------------------
ShutdownTerminal=1     ; 1 cierra MT5 al finalizar, 0 lo deja abierto.
Port=3000              ; Puerto del agente local (3000,3001,3002,3003 típicamente).

; --------------------------------------------------------------------------
; Data / calidad (opcional, depende de build)
; --------------------------------------------------------------------------
; TestFile=             ; Ruta a archivo custom de ticks (si se usa).
; ReplaceHistory=0      ; 1 fuerza recarga de histórico.
; UseLocal=1            ; 1 usa datos locales, 0 permite descargar.
; Cloud=0               ; 1 permite MQL5 Cloud Network, 0 no.

; --------------------------------------------------------------------------
; Parámetros avanzados (mayormente visibles en UI; no siempre soportados por CLI)
; --------------------------------------------------------------------------
; GeneticIterations=10  ; Iteraciones para optimización genética.
; GeneticReport=0       ; 1 guarda reportes intermedios de genética.
; MaxDrawdown=0         ; Filtro de DD (0 desactiva).
; MinTrades=0           ; Filtro de número mínimo de trades.
; CustomMax=0           ; Filtro sobre OnTester si OptimizationCriterion=6.

; --------------------------------------------------------------------------
; Campos usados por plantillas automatizadas (placeholders típicos)
; --------------------------------------------------------------------------
; __LOGIN__, __PASSWORD__, __SERVER__, __EA_NAME__ se rellenan desde scripts.

; ============================================================================
; Notas rápidas de uso
; - Single run: deja Optimization vacío o comentado y ExpertParameters vacío.
; - Genética: Optimization=1, ExpertParameters apunta al .set con rangos Y.
; - Forward: Optimization=3 + ForwardMode>0, ExpertParameters al .set.
; - Multi-símbolo: Optimization=2 y Symbol vacío o en lista (según .set).
; - Modelo 4 (Real ticks) es más lento; usa 2 (Open prices) para validar lógica rápida.
; ============================================================================
